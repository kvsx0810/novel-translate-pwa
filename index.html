<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f14">
  <title>Đọc Truyện CV</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body class="theme-dark">

<!-- ── LIBRARY SCREEN ─────────────────────────────────────────────────────── -->
<div id="screen-library" class="screen active">
  <div class="setup-bg"></div>
  <div class="library-inner">
    <div class="library-header">
      <div class="logo logo-sm">
        <span class="logo-zh">讀</span>
        <div class="logo-text">
          <h1>Đọc Truyện CV</h1>
        </div>
      </div>
      <div class="library-engine-status" id="library-engine-status">⏳ Đang tải engine...</div>
    </div>

    <div id="library-grid" class="library-grid">
      <!-- Book cards rendered here -->
    </div>

    <div class="stats-panel" id="stats-content">
      <!-- rendered by renderStats() -->
    </div>

    <div class="library-empty" id="library-empty" style="display:none">
      <div class="library-empty-icon">📚</div>
      <p>Chưa có sách nào.<br>Bấm <strong>+</strong> để thêm file EPUB.</p>
    </div>

    <button class="btn-add-book" id="btn-add-book" title="Thêm sách"><i class="ti ti-book-upload" aria-hidden="true"></i></button>
    <input type="file" id="input-add-epub" accept=".epub" hidden>
    <div id="library-error" class="setup-error"></div>
  </div>
</div>

<!-- ── SPLASH / SETUP SCREEN ─────────────────────────────────────────────── -->
<div id="screen-setup" class="screen">
  <div class="setup-bg"></div>
  <div class="setup-inner">
    <div class="logo">
      <span class="logo-zh">讀</span>
      <div class="logo-text">
        <h1>Đọc Truyện CV</h1>
        <p>Dịch Trung → Việt ngay trên máy</p>
      </div>
    </div>

    <div class="setup-steps">
      <!-- Step auto: engine + metadata -->
      <div class="step" id="step-engine">
        <div class="step-header">
          <span class="step-num">⚙</span>
          <div>
            <div class="step-title">Engine & Từ điển</div>
            <div class="step-desc" id="engine-status">Đang tải...</div>
          </div>
          <span class="step-badge" id="engine-badge">⏳</span>
        </div>
      </div>

      <!-- Step 1: EPUB -->
      <div class="step" id="step-epub">
        <div class="step-header">
          <span class="step-num">1</span>
          <div>
            <div class="step-title">File truyện</div>
            <div class="step-desc" id="epub-status">Chưa chọn file EPUB</div>
          </div>
          <span class="step-badge" id="epub-badge">⏳</span>
        </div>
        <label class="btn-upload" id="btn-load-epub">
          Chọn file EPUB
          <input type="file" id="input-epub" accept=".epub" hidden>
        </label>
      </div>
    </div>

    <button class="btn-start" id="btn-start" disabled>Bắt đầu đọc →</button>
    <div id="setup-error" class="setup-error"></div>
  </div>
</div>

<!-- ── READER SCREEN ──────────────────────────────────────────────────────── -->
<div id="screen-reader" class="screen">

  <!-- Header -->
  <header class="reader-header" id="reader-header">
    <button class="hdr-btn" id="btn-back-setup" title="Quay lại"><i class="ti ti-arrow-back" aria-hidden="true"></i></button>
    <div class="hdr-title" id="hdr-book-title">Đang tải...</div>
    <div class="hdr-actions">
      <button class="hdr-btn" id="btn-search-chap" title="Tìm kiếm"><i class="ti ti-search" aria-hidden="true"></i></button>
      <button class="hdr-btn" id="btn-toc" title="Mục lục"><i class="ti ti-list" aria-hidden="true"></i></button>
      <button class="hdr-btn" id="btn-settings" title="Cài đặt"><i class="ti ti-settings" aria-hidden="true"></i></button>
    </div>
  </header>

  <!-- Search bar (hidden by default) -->
  <div class="search-bar" id="search-bar" style="display:none">
    <input type="text" id="search-input" placeholder="Tìm trong chương..." autocomplete="off">
    <span class="search-count" id="search-count"></span>
    <button class="hdr-btn" id="btn-search-prev"><i class="ti ti-arrow-up" aria-hidden="true"></i></button>
    <button class="hdr-btn" id="btn-search-next"><i class="ti ti-arrow-down" aria-hidden="true"></i></button>
    <button class="hdr-btn" id="btn-search-close"><i class="ti ti-x" aria-hidden="true"></i></button>
  </div>

  <!-- Content -->
  <main class="reader-content" id="reader-content">
    <div class="chapter-title" id="chapter-title"></div>
    <div class="chapter-body" id="chapter-body"></div>
    <div class="chapter-nav">
      <button class="nav-btn" id="btn-prev-chap"><i class="ti ti-chevron-left" aria-hidden="true"></i> Chương trước</button>
      <span class="nav-info" id="nav-info"></span>
      <button class="nav-btn" id="btn-next-chap">Chương sau <i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
  </main>

  <!-- TOC Drawer -->
  <div class="drawer-overlay" id="toc-overlay"></div>
  <aside class="drawer" id="toc-drawer">
    <div class="drawer-header">
      <h3>Mục lục</h3>
      <button class="drawer-close" id="toc-close"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="toc-search-wrap">
      <input type="text" id="toc-search" placeholder="Tìm chương..." class="toc-search">
    </div>
    <ul class="toc-list" id="toc-list"></ul>
  </aside>

  <!-- Settings Drawer -->
  <div class="drawer-overlay" id="settings-overlay"></div>
  <aside class="drawer drawer-right" id="settings-drawer">
    <div class="drawer-header">
      <h3>Cài đặt</h3>
      <button class="drawer-close" id="settings-close"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="settings-body">

      <div class="setting-group">
        <label class="setting-label">Giao diện</label>
        <div class="theme-swatches">
          <button class="swatch-btn" data-theme="dark"  style="background:#131313" title="Đêm đen"></button>
          <button class="swatch-btn" data-theme="night" style="background:#1a1f2e" title="Đêm xanh"></button>
          <button class="swatch-btn" data-theme="sepia" style="background:#2a1f14" title="Nâu ấm"></button>
          <button class="swatch-btn" data-theme="green" style="background:#1a2818" title="Xanh lá"></button>
          <button class="swatch-btn" data-theme="cream" style="background:#f2ead8" title="Kem vàng"></button>
          <button class="swatch-btn" data-theme="light" style="background:#f8f6f2" title="Trắng sáng"></button>
          <div class="swatch-custom" title="Tùy chỉnh màu nền">
            <input type="color" id="bg-color" value="#131313">
            <span>🎨</span>
          </div>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Font chữ</label>
        <div class="theme-btns">
          <button class="font-btn active" data-font="lora">Lora</button>
          <button class="font-btn" data-font="inter">Inter</button>
          <button class="font-btn" data-font="serif">Serif</button>
          <button class="font-btn" data-font="sans">Sans</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Màu chữ</label>
        <div class="color-row">
          <input type="color" id="text-color" value="#cdd6f4" class="color-picker">
          <button class="btn-sm" id="btn-reset-color">Reset</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Cỡ chữ: <span id="font-size-val">18</span>px</label>
        <input type="range" id="font-size" min="14" max="28" value="18" class="slider">
      </div>

      <div class="setting-group">
        <label class="setting-label">Chiều rộng: <span id="line-width-val">680</span>px</label>
        <input type="range" id="line-width" min="320" max="900" value="680" step="20" class="slider">
      </div>

      <div class="setting-group">
        <label class="setting-label">Khoảng cách dòng: <span id="line-height-val">1.9</span></label>
        <input type="range" id="line-height" min="1.4" max="2.6" value="1.9" step="0.1" class="slider">
      </div>

      <div class="setting-sep"></div>

      <!-- Profile manager -->
      <div class="setting-group">
        <label class="setting-label">Profile tên nhân vật</label>
        <select id="profile-select" class="setting-select">
          <option value="">— Không dùng profile —</option>
        </select>
        <div class="profile-actions">
          <button class="btn-sm" id="btn-new-profile">+ Tạo mới</button>
          <button class="btn-sm btn-danger" id="btn-del-profile">Xóa</button>
        </div>
        <div id="new-profile-form" class="new-profile-form" style="display:none">
          <input type="text" id="new-profile-name" placeholder="Tên profile..." class="setting-input">
          <button class="btn-sm btn-primary" id="btn-create-profile">Tạo</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Danh sách name trong profile</label>
        <div id="phrase-list" class="phrase-list"></div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Thêm name thủ công</label>
        <div class="manual-add">
          <input type="text" id="manual-zw" placeholder="Chữ Trung (梵海孽)" class="setting-input">
          <input type="text" id="manual-vi" placeholder="Tiếng Việt" class="setting-input">
          <div class="manual-btns">
            <button class="btn-sm btn-primary" id="manual-add-profile">+ Profile</button>
            <button class="btn-sm btn-green" id="manual-add-global">+ Global</button>
          </div>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Import / Export</label>
        <div class="ie-btns">
          <button class="btn-sm" id="btn-export-profile">Export Profile</button>
          <label class="btn-sm" id="btn-import-profile">Import Profile<input type="file" id="input-import-profile" accept=".txt" hidden></label>
          <button class="btn-sm" id="btn-export-global">Export Global</button>
          <label class="btn-sm" id="btn-import-global">Import Global<input type="file" id="input-import-global" accept=".txt" hidden></label>
        </div>
      </div>

      <div class="setting-sep"></div>
      <div class="setting-group">
        <label class="setting-label">Global phrases</label>
        <div id="global-phrase-list" class="phrase-list"></div>
        <button class="btn-sm btn-danger" id="btn-clear-global" style="margin-top:8px">Xóa toàn bộ Global</button>
      </div>

    </div>
  </aside>


</div><!-- /screen-reader -->

<!-- Scripts -->
<script src="app.js"></script>
</body>
</html>
